name: CI/CD — BusPoint API

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with coverage
        run: mvn clean verify -q

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t buspoint-api:${{ github.sha }} .

      - name: Verify container starts
        run: |
          docker run -d \
            --name buspoint-test \
            -e MONGODB_URI=mongodb://localhost:27017/test \
            -e JWT_SECRET=test-secret-key-for-ci-pipeline-256bits \
            -p 8080:8080 \
            buspoint-api:${{ github.sha }}
          sleep 10
          docker logs buspoint-test
          docker stop buspoint-test
