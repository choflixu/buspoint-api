curl https://buspoint-api-production.up.railway.app/api/routes# Server
server.port=${PORT:8080}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/buspoint}

# JWT
jwt.secret=${JWT_SECRET:buspoint-secret-key-change-in-production-min-256-bits}
jwt.expiration=86400000

# Mail (password recovery)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# App info
spring.application.name=BusPoint API
